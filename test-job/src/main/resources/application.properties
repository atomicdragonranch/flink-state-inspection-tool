# Checkpointing
flink.checkpoint.interval.ms=30000
flink.checkpoint.retained=5

# Data generation
generator.records.per.second=10
generator.key.count=10
generator.categories=temperature,humidity,pressure,voltage

# Keyed state exerciser
keyed.ema.alpha=0.1
keyed.recent.values.max.size=20

# Partitioned list operator
partitioned.buffer.max.size=50

# Broadcast config source
broadcast.config.interval.seconds=10
broadcast.threshold.initial=85.0
broadcast.threshold.increment=5.0
